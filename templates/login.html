<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Liberty Plus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/main.css') }}">

</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-t-8 border-aqua">
        <div class="p-10">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black text-navy uppercase tracking-tighter">Liberty Plus</h1>
                <p class="text-slate-500 mt-2 font-semibold">Admin Portal Access</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div
                class="mb-6 p-4 rounded-xl {% if category == 'error' %}bg-red-50 text-red-600{% else %}bg-green-50 text-green-600{% endif %} text-sm font-bold">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('admin_login') }}" method="POST" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-navy uppercase tracking-widest pl-1">Username</label>
                    <input type="text" name="username" required
                        class="w-full px-6 py-4 rounded-2xl border-none bg-slate-100 focus:ring-2 focus:ring-aqua transition-all outline-none"
                        placeholder="Enter admin username">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-navy uppercase tracking-widest pl-1">Password</label>
                    <input type="password" name="password" required
                        class="w-full px-6 py-4 rounded-2xl border-none bg-slate-100 focus:ring-2 focus:ring-aqua transition-all outline-none"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full py-5 rounded-full bg-navy text-white font-extrabold text-lg hover:bg-aqua hover:text-navy transition-all shadow-xl shadow-navy/20 active:scale-95 mt-4">
                    Secure Login
                </button>
            </form>

            <div class="mt-8 text-center text-slate-400 text-sm">
                &copy; 2026 Liberty Plus Auto Services
            </div>
        </div>
    </div>
</body>

</html>
