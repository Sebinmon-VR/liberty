<!-- HERO EXACT -->
<section class="hero-section">
    <!-- Left Background Graphic -->
    <div class="hero-left"></div>
    
    <!-- Center Main Body -->
    <div class="hero-center container">
        
        <div class="hero-logo-box">
            <svg viewBox="0 0 100 100" class="hero-logo-icon">
                <circle cx="50" cy="50" r="48" fill="#8fd6e6" />
                <circle cx="50" cy="50" r="40" fill="#0056b3" />
                <!-- Car silhouette approx -->
                <path d="M 25,60 L 30,45 L 70,45 L 75,60 Z" fill="#ffffff" />
                <path d="M 20,60 L 80,60 L 80,65 L 20,65 Z" fill="#8fd6e6" />
            </svg>
            <div class="hero-titles">
                <h1>LIBERTYPLUS</h1>
                <p>PREMIUM AUTO SERVICES UAE</p>
            </div>
        </div>
        
        <button class="btn btn-hero">BOOK CAR WASH</button>
        
        <div class="hero-car">
            <!-- Used mix-blend-mode: screen to eliminate black background -->
            <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=1400" alt="Black car centered">
        </div>
        
    </div>

    <!-- Right Background Graphic -->
    <div class="hero-right"></div>
</section>
