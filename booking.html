<!-- BOOKING EXACT -->
<section class="booking-section">
    <div class="container">
        
        <div class="top-tabs">
            <button class="btn tab-btn active">CAR WASH</button>
            <button class="btn tab-btn outline">OIL/FILTER/GREASE CHANGE</button>
        </div>
        
        <div class="sub-category-cards">
            <div class="sub-card"><h3>FULL<br>WASH</h3></div>
            <div class="sub-card"><h3>BODY<br>WASH</h3></div>
            <div class="sub-card"><h3>WATER<br>WASH</h3></div>
        </div>
        
        <div class="booking-body">
            
            <div class="form-box">
                <div class="form-tabs">
                    <button class="btn f-tab active">
                        <span style="margin-right:8px;">&#127970;</span> OUTLET APPOINTMENT
                    </button>
                    <button class="btn f-tab outline">
                        <span style="margin-right:8px;">&#127968;</span> HOME APPOINTMENT
                    </button>
                </div>
                
                <form class="actual-form">
                    <input type="text" placeholder="Name" class="form-input">
                    <input type="text" placeholder="Mobile Number" class="form-input">
                    
                    <div class="select-container">
                        <select class="form-input"><option>Car Model</option></select>
                    </div>
                    <div class="select-container">
                        <select class="form-input"><option>Wash Type</option></select>
                    </div>
                    
                    <div class="form-row">
                        <input type="text" placeholder="Date" class="form-input half" onfocus="this.type='date'">
                        <input type="text" placeholder="Time" class="form-input half" onfocus="this.type='time'">
                    </div>
                    
                    <div class="form-footer">
                        <span class="status-green">SELECTED TIME SLOT IS AVAILABLE</span>
                        <div class="price-action">
                            <span class="price-val">AED 21</span>
                            <button type="button" class="btn btn-submit">BOOK</button>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="info-box">
                <h2 class="info-h2">BOOK YOUR<br>CAR WASH<br>TODAY</h2>
                
                <div class="info-item">
                    <h4>OUTLET APPOINTMENT</h4>
                    <p>DROP YOUR CAR OFF AT OUR CAR WASH CENTER</p>
                </div>
                
                <div class="info-item">
                    <h4>HOME APPOINTMENT</h4>
                    <p>CAR WASH SERVICE ARRIVES AT YOUR ADDRESS</p>
                </div>
            </div>
            
        </div>
        
    </div>
</section>
